# docker-compose.yml — Local development with full observability stack
# Run: docker compose up --build
# Gateway URL: http://localhost:3004
# Registry:    http://localhost:3000/services
# Jaeger UI:   http://localhost:16686
# Prometheus:  http://localhost:9090
# Grafana:     http://localhost:3100  (admin/admin)

services:

  # ── MICROSERVICES ─────────────────────────────────────────────────────────

  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      retries: 5
      start_period: 5s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      PORT: 3001
      HOST: user-service
      REGISTRY_URL: http://registry:3000
      K8S_MODE: "false"
    depends_on:
      registry:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      PORT: 3002
      HOST: product-service
      REGISTRY_URL: http://registry:3000
      K8S_MODE: "false"
    depends_on:
      registry:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      PORT: 3003
      HOST: order-service
      REGISTRY_URL: http://registry:3000
      K8S_MODE: "false"
    depends_on:
      registry:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      HOST: api-gateway
      REGISTRY_URL: http://registry:3000
      K8S_MODE: "false"
    depends_on:
      registry:
        condition: service_healthy

  # ── OBSERVABILITY ─────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "6831:6831/udp"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml
    depends_on:
      - prometheus
